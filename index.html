<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CR Fitness</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #d60000;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
    }

    .card {
      background: #222;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 350px;
    }

    button {
      background: #d60000;
      color: white;
      border: none;
      padding: 15px 25px;
      border-radius: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>
CR Fitness 💪
</header>

<div class="container">

  <div class="card">
    <h2>Welcome!</h2>
    <p>Train hard. Track progress. Reach your goals.</p>
  </div>

  <div class="card">
    <h2>Today's Workout</h2>
    <p>No workout logged yet.</p>
    <button>Start Workout</button>
  </div>

  <div class="card">
    <h2>Current Weight</h2>
    <h1>220 lbs</h1>
  </div>

</div>

</body>
</html>
